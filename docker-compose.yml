services:
    # ==========================================
    # 1. Database: PostgreSQL
    # ==========================================
    postgres-db:
        image: postgres:16
        container_name: game-database
        restart: always
        environment:
            POSTGRES_USER: mladmin
            POSTGRES_PASSWORD: password
            POSTGRES_DB: ml_game_db
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data

    # ==========================================
    # 2. Database GUI: pgAdmin
    # ==========================================
    pgadmin:
        image: dpage/pgadmin4
        container_name: game-pgadmin
        restart: always
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@game.com
            PGADMIN_DEFAULT_PASSWORD: admin
        ports:
            - "5050:80"
        depends_on:
            - postgres-db

    # ==========================================
    # 3. API Gateway: Spring Boot
    # ==========================================
    backend:
        build:
            context: ./server
        container_name: spring-api
        ports:
            - "8080:8080"
        environment:
            # This tells Spring Boot to look for the database container on the internal network
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/ml_game_db
            SPRING_DATASOURCE_USERNAME: mladmin
            SPRING_DATASOURCE_PASSWORD: password
        depends_on:
            - postgres-db

    frontend:
        build:
            context: ./frontend
        container_name: react-client
        ports:
            - "5173:5173"
        volumes:
            - ./frontend:/app
            - ./artifacts/base-models:/app/public/artifacts/base-models:ro
            - /app/node_modules
        environment:
            - CHOKIDAR_USEPOLLING=true
        depends_on:
            - backend

volumes:
    pgdata:

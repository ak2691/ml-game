spring.application.name=machiner
machiner.security.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
machiner.security.require-https=false
machiner.security.max-http-request-bytes=1048576
machiner.security.max-web-socket-message-bytes=65536
machiner.security.max-web-socket-send-buffer-bytes=4194304
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.timeout=2h
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.error.whitelabel.enabled=false
server.max-http-request-header-size=16KB
